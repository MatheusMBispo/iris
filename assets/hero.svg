<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 800 200">
  <defs>
    <style>
      .box { fill: #f0f4f8; stroke: #a0aec0; stroke-width: 2; rx: 8; ry: 8; }
      .box-iris { fill: #e6fffa; stroke: #3182ce; stroke-width: 3; rx: 8; ry: 8; }
      .box-provider { fill: #fffaf0; stroke: #38b2ac; stroke-width: 2; rx: 8; ry: 8; stroke-dasharray: 4; }
      .text-title { font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif; font-weight: 600; font-size: 16px; fill: #2d3748; }
      .text-sub { font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif; font-size: 13px; fill: #4a5568; }
      .arrow { stroke: #cbd5e0; stroke-width: 3; fill: none; }
      .arrow-head { fill: #cbd5e0; }
    </style>
    <marker id="arrowhead" markerWidth="10" markerHeight="7" refX="9" refY="3.5" orient="auto">
      <polygon points="0 0, 10 3.5, 0 7" class="arrow-head" />
    </marker>
  </defs>

  <!-- Input -->
  <rect x="40" y="60" width="140" height="80" class="box" />
  <text x="110" y="95" text-anchor="middle" class="text-title">Image</text>
  <text x="110" y="115" text-anchor="middle" class="text-sub">Receipt, Invoice</text>

  <path d="M 180 100 L 230 100" class="arrow" marker-end="url(#arrowhead)" />

  <!-- IrisClient -->
  <rect x="240" y="60" width="160" height="80" class="box-iris" />
  <text x="320" y="95" text-anchor="middle" class="text-title">IrisClient</text>
  <text x="320" y="115" text-anchor="middle" class="text-sub">1 API Call</text>

  <path d="M 400 90 L 450 65" class="arrow" marker-end="url(#arrowhead)" />
  <path d="M 400 110 L 450 135" class="arrow" marker-end="url(#arrowhead)" />

  <!-- Providers -->
  <rect x="460" y="30" width="120" height="60" class="box-provider" />
  <text x="520" y="55" text-anchor="middle" class="text-title">Cloud</text>
  <text x="520" y="75" text-anchor="middle" class="text-sub">Claude, OpenAI</text>

  <rect x="460" y="110" width="120" height="60" class="box-provider" />
  <text x="520" y="135" text-anchor="middle" class="text-title">Local</text>
  <text x="520" y="155" text-anchor="middle" class="text-sub">Apple FM, Ollama</text>

  <path d="M 580 65 L 630 90" class="arrow" marker-end="url(#arrowhead)" />
  <path d="M 580 135 L 630 110" class="arrow" marker-end="url(#arrowhead)" />

  <!-- Output -->
  <rect x="640" y="60" width="120" height="80" class="box" />
  <text x="700" y="95" text-anchor="middle" class="text-title">Swift Struct</text>
  <text x="700" y="115" text-anchor="middle" class="text-sub">Strongly Typed</text>
</svg>

name: CI

permissions:
  contents: read

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  build-test:
    name: Build & Test
    runs-on: macos-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Cache SPM dependencies
        uses: actions/cache@v4
        with:
          path: .build
          key: ${{ runner.os }}-spm-${{ hashFiles('Package.resolved', 'Package.swift', '.github/workflows/ci.yml') }}
          restore-keys: ${{ runner.os }}-spm-

      - name: Build
        run: swift build

      - name: Test (unit — no API key)
        run: swift test --skip Integration

      - name: DocC check
        run: swift package --allow-writing-to-directory /tmp/docc generate-documentation --target Iris --output-path /tmp/docc

  integration:
    name: Integration Tests
    runs-on: macos-latest
    if: github.ref == 'refs/heads/main' && github.event_name == 'push'
    needs: build-test

    env:
      ANTHROPIC_API_KEY: ${{ secrets.ANTHROPIC_API_KEY }}

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Integration Tests
        run: swift test --filter Integration
